<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello from Antigravity | My First Page</title>
  <meta name="description" content="안티그래비티와 함께 구축한 첫 번째 웹페이지. GitHub 버전 관리 및 Cloudflare Pages 배포 완료.">
  <style>
    /* Reset & Fonts */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      color-scheme: dark;
      --bg-gradient: radial-gradient(circle at 50% 50%, #121324 0%, #080911 100%);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-border-hover: rgba(147, 51, 234, 0.4);
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --accent-purple: #a855f7;
      --accent-cyan: #06b6d4;
      --glow-purple: rgba(168, 85, 247, 0.15);
      --glow-cyan: rgba(6, 182, 212, 0.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans KR", sans-serif, "Apple Color Emoji";
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      position: relative;
      padding: 20px;
    }

    /* Ambient Background Glows */
    .glow-sphere {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      pointer-events: none;
      opacity: 0.6;
    }

    .glow-sphere-1 {
      top: 15%;
      left: 15%;
      background: var(--glow-purple);
      animation: float-ambient 12s ease-in-out infinite alternate;
    }

    .glow-sphere-2 {
      bottom: 15%;
      right: 15%;
      background: var(--glow-cyan);
      animation: float-ambient 16s ease-in-out infinite alternate-reverse;
    }

    /* Main Container with Glassmorphism */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 580px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      text-align: center;
      transition: border-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s ease, box-shadow 0.3s ease;
    }

    .container:hover {
      border-color: var(--card-border-hover);
      box-shadow: 0 30px 60px rgba(168, 85, 247, 0.1), 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    /* Decorative Logo / Icon */
    .logo-container {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-cyan) 100%);
      margin-bottom: 32px;
      position: relative;
      box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3);
      animation: logo-bounce 4s ease-in-out infinite;
    }

    .logo-container::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 100%);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .container:hover .logo-container::after {
      opacity: 1;
    }

    .logo-icon {
      font-size: 36px;
      font-weight: bold;
      background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      user-select: none;
    }

    /* Typography */
    h1 {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ffffff 30%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 36px;
      word-break: keep-all;
    }

    /* Info Badges */
    .status-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 36px;
      text-align: left;
    }

    .status-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .status-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }

    .status-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      font-size: 20px;
    }

    .status-info {
      flex: 1;
    }

    .status-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 2px;
    }

    .status-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Live Dot Indicator */
    .indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background-color: #10b981;
      border-radius: 50%;
      position: relative;
    }

    .dot::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: #10b981;
      border-radius: 50%;
      animation: pulse-dot 1.5s infinite ease-in-out;
    }

    /* CTA Button */
    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 16px 32px;
      font-size: 1rem;
      font-weight: 600;
      color: #0d0e15;
      background: #ffffff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
    }

    .btn-action:hover {
      background: #f8fafc;
      transform: scale(1.02);
      box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
    }

    .btn-action:active {
      transform: scale(0.98);
    }

    /* Keyframes Animations */
    @keyframes float-ambient {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.15); }
    }

    @keyframes logo-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pulse-dot {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(3); opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 32px 24px;
      }
      h1 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>

  <!-- Ambient Glowing Background Spheres -->
  <div class="glow-sphere glow-sphere-1" aria-hidden="true"></div>
  <div class="glow-sphere glow-sphere-2" aria-hidden="true"></div>

  <!-- Main Container -->
  <main class="container" id="main-content">
    
    <!-- Animated Logo -->
    <div class="logo-container" id="logo-badge">
      <span class="logo-icon">Λ</span>
    </div>

    <!-- Main Title -->
    <h1 id="main-title">Hello from Antigravity</h1>

    <!-- Description -->
    <p class="subtitle" id="main-subtitle">
      이 페이지는 GitHub, Cloudflare Pages, Netlify를 통해 성공적으로 버전 관리 및 자동 배포가 완료된 안티그래비티의 첫 번째 공간입니다.
    </p>

    <!-- Interactivity: Status Board -->
    <div class="status-group" id="status-board" role="region" aria-label="배포 및 연동 현황">
      
      <!-- GitHub Status Card -->
      <a href="https://github.com/junchee/my_first_git" target="_blank" rel="noopener noreferrer" class="status-card" id="card-github" tabindex="0">
        <span class="status-icon" aria-hidden="true">🐙</span>
        <div class="status-info">
          <p class="status-label">Repository Connection</p>
          <p class="status-value">GitHub Connected</p>
        </div>
        <div class="indicator">
          <span class="dot" aria-hidden="true"></span>
        </div>
      </a>

      <!-- Cloudflare Status Card -->
      <a href="https://my-first-git.pages.dev" target="_blank" rel="noopener noreferrer" class="status-card" id="card-cloudflare" tabindex="0">
        <span class="status-icon" aria-hidden="true">⚡</span>
        <div class="status-info">
          <p class="status-label">Deployment Platform</p>
          <p class="status-value">Cloudflare Pages Live</p>
        </div>
        <div class="indicator">
          <span class="dot" aria-hidden="true"></span>
        </div>
      </a>

      <!-- Netlify Status Card -->
      <a href="https://my-first-git.netlify.app" target="_blank" rel="noopener noreferrer" class="status-card" id="card-netlify" tabindex="0">
        <span class="status-icon" aria-hidden="true">🚀</span>
        <div class="status-info">
          <p class="status-label">Backup Deployment</p>
          <p class="status-value">Netlify Live</p>
        </div>
        <div class="indicator">
          <span class="dot" aria-hidden="true"></span>
        </div>
      </a>

    </div>

    <!-- Action CTA -->
    <button class="btn-action" id="btn-explore" onclick="alert('반갑습니다! 안티그래비티와 함께 다음 여정을 시작해 보세요.')">
      다음 여정 탐색하기
    </button>

  </main>

</body>
</html>
